name: Preview release artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, e.g. 0.2.9-preview'
        required: true
        default: '0.2.9-preview'
      release_notes:
        description: 'Release notes file'
        required: true
        default: 'RELEASE_0_2_9_MAC_PREVIEW.md'

permissions:
  contents: read

jobs:
  macos-dmg:
    name: macOS DMG + app zip
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "FIRESTAFF_VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"
            echo "FIRESTAFF_RELEASE_NOTES=${{ github.event.inputs.release_notes }}" >> "$GITHUB_ENV"
          else
            echo "FIRESTAFF_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
            if [ -f "RELEASE_${GITHUB_REF_NAME#v}.md" ]; then
              echo "FIRESTAFF_RELEASE_NOTES=RELEASE_${GITHUB_REF_NAME#v}.md" >> "$GITHUB_ENV"
            else
              echo "FIRESTAFF_RELEASE_NOTES=RELEASE_0_2_9_MAC_PREVIEW.md" >> "$GITHUB_ENV"
            fi
          fi
      - name: Install SDL3
        run: brew install sdl3 || true
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --parallel
      - name: Smoke test
        run: |
          SDL_VIDEODRIVER=dummy ./build/firestaff_m11_phase_a_probe
          ./build/firestaff_m11_audio_probe
      - name: Package macOS preview
        run: |
          VERSION="$FIRESTAFF_VERSION" \
          SHORT_VERSION="${FIRESTAFF_VERSION%%-*}" \
          RELEASE_NOTES_SRC="$PWD/$FIRESTAFF_RELEASE_NOTES" \
          ./scripts/package_macos_preview.sh
          shasum -a 256 "release/Firestaff-${FIRESTAFF_VERSION}.dmg" "release/Firestaff-${FIRESTAFF_VERSION}.zip" > "release/Firestaff-${FIRESTAFF_VERSION}-macos.sha256"
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firestaff-${{ env.FIRESTAFF_VERSION }}-macos
          path: |
            release/Firestaff-${{ env.FIRESTAFF_VERSION }}.dmg
            release/Firestaff-${{ env.FIRESTAFF_VERSION }}.zip
            release/Firestaff-${{ env.FIRESTAFF_VERSION }}-macos.sha256

  windows-installer:
    name: Windows zip + installer exe
    runs-on: windows-2022
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "FIRESTAFF_VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"
            echo "FIRESTAFF_RELEASE_NOTES=${{ github.event.inputs.release_notes }}" >> "$GITHUB_ENV"
          else
            echo "FIRESTAFF_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
            echo "FIRESTAFF_RELEASE_NOTES=RELEASE_0_2_9_MAC_PREVIEW.md" >> "$GITHUB_ENV"
          fi
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-sdl3
            mingw-w64-ucrt-x86_64-nsis
      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --parallel
      - name: Smoke test
        run: |
          SDL_VIDEODRIVER=dummy ./build/firestaff_m11_phase_a_probe
          ./build/firestaff_m11_audio_probe
      - name: Package Windows preview zip and installer
        run: |
          VERSION="$FIRESTAFF_VERSION" RELEASE_NOTES_SRC="$PWD/$FIRESTAFF_RELEASE_NOTES" ./scripts/package_windows_preview.sh
          VERSION="$FIRESTAFF_VERSION" ./scripts/package_windows_installer_preview.sh
          sha256sum "release/Firestaff-${FIRESTAFF_VERSION}-windows.zip" "release/Firestaff-${FIRESTAFF_VERSION}-windows-installer.exe" > "release/Firestaff-${FIRESTAFF_VERSION}-windows.sha256"
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firestaff-${{ env.FIRESTAFF_VERSION }}-windows
          path: |
            release/Firestaff-${{ env.FIRESTAFF_VERSION }}-windows.zip
            release/Firestaff-${{ env.FIRESTAFF_VERSION }}-windows-installer.exe
            release/Firestaff-${{ env.FIRESTAFF_VERSION }}-windows.sha256

  linux-packages:
    name: Linux DEB + RPM
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "FIRESTAFF_VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"
            echo "FIRESTAFF_RELEASE_NOTES=${{ github.event.inputs.release_notes }}" >> "$GITHUB_ENV"
          else
            echo "FIRESTAFF_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
            echo "FIRESTAFF_RELEASE_NOTES=RELEASE_0_2_9_MAC_PREVIEW.md" >> "$GITHUB_ENV"
          fi
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build rpm dpkg-dev git pkg-config libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev libxfixes-dev libxss-dev libwayland-dev libxkbcommon-dev wayland-protocols
          git clone --depth 1 https://github.com/libsdl-org/SDL.git /tmp/SDL3
          cmake -S /tmp/SDL3 -B /tmp/SDL3-build -G Ninja -DCMAKE_BUILD_TYPE=Release -DSDL_SHARED=ON -DSDL_STATIC=OFF -DSDL_TESTS=OFF
          cmake --build /tmp/SDL3-build --parallel
          sudo cmake --install /tmp/SDL3-build
          sudo ldconfig
      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --parallel
      - name: Smoke test
        run: |
          SDL_VIDEODRIVER=dummy ./build/firestaff_m11_phase_a_probe
          ./build/firestaff_m11_audio_probe
      - name: Package Linux preview
        run: |
          VERSION="$FIRESTAFF_VERSION" RELEASE_NOTES_SRC="$PWD/$FIRESTAFF_RELEASE_NOTES" ./scripts/package_linux_preview.sh
          sha256sum release/firestaff_${FIRESTAFF_VERSION}_*.deb release/firestaff-${FIRESTAFF_VERSION}.*.rpm > "release/Firestaff-${FIRESTAFF_VERSION}-linux.sha256"
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firestaff-${{ env.FIRESTAFF_VERSION }}-linux
          path: |
            release/*.deb
            release/*.rpm
            release/Firestaff-${{ env.FIRESTAFF_VERSION }}-linux.sha256
