name: M10 verify + CMake build + cross-platform determinism

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  SDL3_TAG: release-3.2.14

jobs:
  cmake-build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2022]
        include:
          - os: ubuntu-24.04
            shell: bash
            generator: Ninja
            exe: ''
          - os: macos-14
            shell: bash
            generator: Unix Makefiles
            exe: ''
          - os: windows-2022
            shell: msys2 {0}
            generator: Ninja
            exe: '.exe'

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - uses: actions/checkout@v4

      - name: Install SDL3 (macOS)
        if: runner.os == 'macOS'
        run: brew install sdl3 || true

      - name: Install SDL3 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build git pkg-config \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev libxfixes-dev \
            libxss-dev libxtst-dev libwayland-dev libxkbcommon-dev wayland-protocols
          git clone --depth 1 --branch "$SDL3_TAG" https://github.com/libsdl-org/SDL.git /tmp/SDL3
          cmake -S /tmp/SDL3 -B /tmp/SDL3-build -G Ninja -DCMAKE_BUILD_TYPE=Release -DSDL_SHARED=ON -DSDL_STATIC=OFF -DSDL_TESTS=OFF
          cmake --build /tmp/SDL3-build --parallel
          sudo cmake --install /tmp/SDL3-build
          sudo ldconfig

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-sdl3

      - name: CMake configure
        run: cmake -B build -G "${{ matrix.generator }}" -DCMAKE_BUILD_TYPE=Release

      - name: CMake build
        run: cmake --build build --parallel

      - name: Run Phase A probe (headless, no game data needed)
        run: |
          SDL_VIDEODRIVER=dummy ./build/firestaff_m11_phase_a_probe${{ matrix.exe }} 2>&1 | tee phase_a.log
          grep '^# summary: ' phase_a.log
          PASSED=$(grep '^# summary: ' phase_a.log | awk '{print $3}' | cut -d/ -f1)
          TOTAL=$(grep '^# summary: ' phase_a.log | awk '{print $3}' | cut -d/ -f2)
          if [ "$PASSED" != "$TOTAL" ]; then
            echo "::error::Phase A probe: $PASSED/$TOTAL"
            exit 1
          fi
          echo "Phase A probe: PASS ($PASSED/$TOTAL)"

      - name: Run Audio probe (no SDL3_mixer needed)
        run: |
          ./build/firestaff_m11_audio_probe${{ matrix.exe }} 2>&1 | tee audio.log
          grep '^# summary: ' audio.log
          PASSED=$(grep '^# summary: ' audio.log | awk '{print $3}' | cut -d/ -f1)
          TOTAL=$(grep '^# summary: ' audio.log | awk '{print $3}' | cut -d/ -f2)
          if [ "$PASSED" != "$TOTAL" ]; then
            echo "::error::Audio probe: $PASSED/$TOTAL"
            exit 1
          fi
          echo "Audio probe: PASS ($PASSED/$TOTAL)"

  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2022]
        compiler: [default]
        include:
          - os: ubuntu-24.04
            cc: gcc
            shell: bash
          - os: macos-14
            cc: clang
            shell: bash
          - os: windows-2022
            cc: gcc
            shell: msys2 {0}

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 (Windows only)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja

      - name: Run M10 verify (when licensed assets are available)
        run: |
          chmod +x ./run_firestaff_m10_verify.sh
          if [ -f "$HOME/.firestaff/data/GRAPHICS.DAT" ]; then
            ./run_firestaff_m10_verify.sh "$HOME/.firestaff/data/GRAPHICS.DAT" 2>&1 | tee verify.log
            tail -20 verify.log
          else
            echo "SKIP: GRAPHICS.DAT not present on runner, so asset-dependent M10 verify is skipped." | tee verify.log
          fi

      - name: Assert all 20 phases PASS (if full verify ran)
        run: |
          if grep -q "^=== Phase 1:" verify.log; then
            PASS_COUNT=$(grep -c ": PASS$" verify.log || echo 0)
            if [ "$PASS_COUNT" -lt 20 ]; then
              echo "::error::Expected 20 PASS, got $PASS_COUNT"
              exit 1
            fi
          else
            echo "Skipping PASS-count assertion because full verify did not run on this runner."
          fi

      - name: Compute deterministic world-hash
        run: |
          chmod +x ./run_firestaff_headless_driver.sh
          # Use a tiny synthetic dungeon file committed to tests/fixtures/
          if [ -f tests/fixtures/minimal.DAT ]; then
            ./run_firestaff_headless_driver.sh tests/fixtures/minimal.DAT --seed 42 --ticks 100 2>&1 | tee hash-${{ matrix.os }}.txt
            grep "final_hash:" hash-${{ matrix.os }}.txt > hash-only-${{ matrix.os }}.txt
          fi

      - name: Upload hash artefact
        if: hashFiles('hash-only-*.txt') != ''
        uses: actions/upload-artifact@v4
        with:
          name: determinism-hash-${{ matrix.os }}
          path: hash-only-*.txt

  cross-platform-determinism:
    needs: verify
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: determinism-hash-*
          merge-multiple: true

      - name: Compare hashes across platforms
        run: |
          echo "Hashes per platform:"
          cat hash-only-*.txt || echo "No hash files (skipping)"
          # All hash files must be byte-identical
          if ls hash-only-*.txt >/dev/null 2>&1; then
            FIRST=$(head -1 hash-only-ubuntu-24.04.txt)
            for f in hash-only-*.txt; do
              if [ "$(head -1 $f)" != "$FIRST" ]; then
                echo "::error::Determinism broken: $f differs from baseline"
                echo "baseline: $FIRST"
                echo "$f: $(head -1 $f)"
                exit 1
              fi
            done
            echo "✓ All platforms produced identical hash: $FIRST"
          fi


  web-wasm-toolchain-probe:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Probe Web/WASM toolchain availability
        run: ./scripts/probes/run_firestaff_web_wasm_toolchain_probe.sh

  warnings-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Strict -Wall -Wextra -Werror build
        run: |
          shopt -s nullglob
          probes_found=0
          for probe in probes/*/firestaff_*_probe.c probes/firestaff_*_probe.c; do
            [ -f "$probe" ] || continue
            echo "=== $probe ==="
            gcc -Wall -Wextra -Werror -Wno-format-truncation -Iinclude -Isrc -c -o /tmp/probe.o "$probe" 2>&1 || echo "  SKIP (missing deps)"
            probes_found=1
          done
          if [ "$probes_found" = 0 ]; then echo "No probes matched — OK"; fi
          echo "Warnings check complete"
