name: M10 verify + CMake build + cross-platform determinism

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  cmake-build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL3
        run: brew install sdl3 || true

      - name: CMake configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: CMake build
        run: cmake --build build --parallel

      - name: Run Phase A probe (headless, no game data needed)
        run: |
          SDL_VIDEODRIVER=dummy ./build/firestaff_m11_phase_a_probe 2>&1 | tee phase_a.log
          grep '^# summary: ' phase_a.log
          PASSED=$(grep '^# summary: ' phase_a.log | awk '{print $3}' | cut -d/ -f1)
          TOTAL=$(grep '^# summary: ' phase_a.log | awk '{print $3}' | cut -d/ -f2)
          if [ "$PASSED" != "$TOTAL" ]; then
            echo "::error::Phase A probe: $PASSED/$TOTAL"
            exit 1
          fi
          echo "Phase A probe: PASS ($PASSED/$TOTAL)"

      - name: Run Audio probe (no SDL3_mixer needed)
        run: |
          ./build/firestaff_m11_audio_probe 2>&1 | tee audio.log
          grep '^# summary: ' audio.log
          PASSED=$(grep '^# summary: ' audio.log | awk '{print $3}' | cut -d/ -f1)
          TOTAL=$(grep '^# summary: ' audio.log | awk '{print $3}' | cut -d/ -f2)
          if [ "$PASSED" != "$TOTAL" ]; then
            echo "::error::Audio probe: $PASSED/$TOTAL"
            exit 1
          fi
          echo "Audio probe: PASS ($PASSED/$TOTAL)"

  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2022]
        compiler: [default]
        include:
          - os: ubuntu-24.04
            cc: gcc
            shell: bash
          - os: macos-14
            cc: clang
            shell: bash
          - os: windows-2022
            cc: gcc
            shell: msys2 {0}

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 (Windows only)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja

      - name: Run M10 verify (when licensed assets are available)
        run: |
          chmod +x ./run_firestaff_m10_verify.sh
          if [ -f "$HOME/.firestaff/data/GRAPHICS.DAT" ]; then
            ./run_firestaff_m10_verify.sh "$HOME/.firestaff/data/GRAPHICS.DAT" 2>&1 | tee verify.log
            tail -20 verify.log
          else
            echo "SKIP: GRAPHICS.DAT not present on runner, so asset-dependent M10 verify is skipped." | tee verify.log
          fi

      - name: Assert all 20 phases PASS (if full verify ran)
        run: |
          if grep -q "^=== Phase 1:" verify.log; then
            PASS_COUNT=$(grep -c ": PASS$" verify.log || echo 0)
            if [ "$PASS_COUNT" -lt 20 ]; then
              echo "::error::Expected 20 PASS, got $PASS_COUNT"
              exit 1
            fi
          else
            echo "Skipping PASS-count assertion because full verify did not run on this runner."
          fi

      - name: Compute deterministic world-hash
        run: |
          chmod +x ./run_firestaff_headless_driver.sh
          # Use a tiny synthetic dungeon file committed to tests/fixtures/
          if [ -f tests/fixtures/minimal.DAT ]; then
            ./run_firestaff_headless_driver.sh tests/fixtures/minimal.DAT --seed 42 --ticks 100 2>&1 | tee hash-${{ matrix.os }}.txt
            grep "final_hash:" hash-${{ matrix.os }}.txt > hash-only-${{ matrix.os }}.txt
          fi

      - name: Upload hash artefact
        if: hashFiles('hash-only-*.txt') != ''
        uses: actions/upload-artifact@v4
        with:
          name: determinism-hash-${{ matrix.os }}
          path: hash-only-*.txt

  cross-platform-determinism:
    needs: verify
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: determinism-hash-*
          merge-multiple: true

      - name: Compare hashes across platforms
        run: |
          echo "Hashes per platform:"
          cat hash-only-*.txt || echo "No hash files (skipping)"
          # All hash files must be byte-identical
          if ls hash-only-*.txt >/dev/null 2>&1; then
            FIRST=$(head -1 hash-only-ubuntu-24.04.txt)
            for f in hash-only-*.txt; do
              if [ "$(head -1 $f)" != "$FIRST" ]; then
                echo "::error::Determinism broken: $f differs from baseline"
                echo "baseline: $FIRST"
                echo "$f: $(head -1 $f)"
                exit 1
              fi
            done
            echo "✓ All platforms produced identical hash: $FIRST"
          fi

  warnings-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Strict -Wall -Wextra -Werror build
        run: |
          for probe in firestaff_m10_*_probe.c; do
            echo "=== $probe ==="
            gcc -Wall -Wextra -Werror -c -o /tmp/probe.o "$probe" || exit 1
          done
          echo "All M10 probes compile clean with -Werror"
